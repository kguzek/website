name: CI

permissions:
  contents: read

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup node
        uses: actions/setup-node@v6
        with:
          node-version-file: "package.json"
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install

      - name: Generate types
        run: pnpm run types:generate
        if: always()

      - name: Format check
        run: pnpm run format:check
        if: always()

      - name: Lint
        run: pnpm run lint
        if: always()

      - name: Typecheck
        run: pnpm run types:check
        if: always()

      - name: Build
        run: pnpm run build
        if: always()
