version: 2
updates:
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 15

    ignore:
      - dependency-name: "*"
        update-types:
          - "version-update:semver-major"

    groups:
      react:
        patterns:
          - "react"
          - "react-dom"
          - "@types/react"
          - "@types/react-dom"

      typescript-eslint:
        patterns:
          - "@typescript-eslint/*"
